server {
    listen 80;
    server_name paperpulse.ukurup.com;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# App subdomain — port-80 only for now (ACME webroot + redirect). The 443 block
# is added in a follow-up commit AFTER the cert is issued; nginx refuses to start
# if ssl_certificate points at a file that does not exist yet.
server {
    listen 80;
    server_name app.paperpulse.ukurup.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name paperpulse.ukurup.com;

    ssl_certificate /etc/letsencrypt/live/paperpulse.ukurup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paperpulse.ukurup.com/privkey.pem;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $blog_upstream blog:4000;
        proxy_pass http://$blog_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
