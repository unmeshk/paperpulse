<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PaperPulse{% endblock %}</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/static/main.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="site-header" role="banner">
    <div class="wrapper">
      <a class="site-title" rel="author" href="/">Paperpulse</a>
      <nav class="site-nav">
        <input type="checkbox" id="nav-trigger" class="nav-trigger" />
        <label for="nav-trigger">
          <span class="menu-icon">
            <svg viewBox="0 0 18 15" width="18px" height="15px">
              <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,0,18,0.665,18,1.484z M18,7.516c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,8.969,0,8.304,0,7.516c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,6.031,18,6.696,18,7.516z M18,13.516c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,14.969,0,14.304,0,13.516c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,12.031,18,12.696,18,13.516z"/>
            </svg>
          </span>
        </label>
        <div class="trigger">
          {% if user %}
            <span class="nav-user">{{ user.email }}</span>
            <a class="page-link" href="/feed">Feed</a>
            <a class="page-link" href="/settings">Settings</a>
            <a class="page-link" href="/auth/logout">Sign out</a>
          {% else %}
            <a class="page-link" href="/auth/login">Sign in with Google</a>
          {% endif %}
          <a class="page-link" href="https://paperpulse.ukurup.com">Blog</a>
        </div>
      </nav>
    </div>
  </header>
  <main class="page-content" aria-label="Content">
    <div class="wrapper">{% block content %}{% endblock %}</div>
  </main>
  <footer class="site-footer h-card">
    <div class="wrapper">
      <div class="footer-col-wrapper">
        <div class="footer-col footer-col-1">
          <p>Your daily summary of ML papers on ArXiV</p>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
