<header class="site-header" role="banner">
    <div class="wrapper">
      <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>

      <nav class="site-nav">
        <input type="checkbox" id="nav-trigger" class="nav-trigger" />
        <label for="nav-trigger">
          <span class="menu-icon">
            <svg viewBox="0 0 18 15" width="18px" height="15px">
              <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,0,18,0.665,18,1.484z M18,7.516c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,8.969,0,8.304,0,7.516c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,6.031,18,6.696,18,7.516z M18,13.516c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,14.969,0,14.304,0,13.516c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,12.031,18,12.696,18,13.516z"/>
            </svg>
          </span>
        </label>
       
        <div class="trigger" id="contextual-nav">
          <a class="page-link" href="https://app.paperpulse.ukurup.com/login">Log in</a>
        </div>
        <script>
          // Swap the nav to the logged-in state when the app's indicator
          // cookie (display hint only, set/cleared by the app) is present.
          (function () {
            if (!/(?:^|;\s*)pp_logged_in=1(?:;|$)/.test(document.cookie)) return;
            var base = window.location.hostname === "localhost"
              ? "http://localhost:8000"
              : "https://app.paperpulse.ukurup.com";
            document.getElementById("contextual-nav").innerHTML =
              '<a class="page-link" href="' + base + '/feed">Feed</a>' +
              '<a class="page-link" href="' + base + '/settings">Settings</a>' +
              '<a class="page-link" href="' + base + '/auth/logout">Sign out</a>';
          })();
        </script>
      </nav>
    </div>
  </header>
